
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: distillai_db
    restart: always
    environment:
      POSTGRES_USER: user           # Ajustado para bater com o .env
      POSTGRES_PASSWORD: password   # Ajustado para bater com o .env
      POSTGRES_DB: distilldb        # Ajustado para bater com o .env
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: distillai_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: